<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Limble CMMS Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">Limble CMMS</h1>
      <span class="header-subtitle">Work Orders</span>
    </div>
    <div class="header-right">
      <button id="btn-refresh" class="btn btn-secondary" title="Refresh">&#8635; Refresh</button>
    </div>
  </header>

  <div class="filter-bar">
    <label class="filter-group">
      Status:
      <select id="filter-status"><option value="all">All</option></select>
    </label>
    <label class="filter-group">
      Priority:
      <select id="filter-priority"><option value="all">All</option></select>
    </label>
    <label class="filter-group">
      Tag:
      <select id="filter-tag"><option value="all">All</option></select>
    </label>
    <span id="wo-count" class="wo-count"></span>
  </div>

  <main id="main" class="main"></main>

  <script src="/app.js"></script>
</body>
</html>
