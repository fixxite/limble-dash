<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Limble CMMS Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">Limble CMMS</h1>
      <span class="header-subtitle">Work Orders</span>
    </div>
    <div class="header-right">
      <input id="search" type="search" class="header-search" placeholder="Search work orders…" autocomplete="off" />
      <button id="btn-refresh" class="btn btn-secondary" title="Refresh">&#8635; Refresh</button>
      <button id="btn-trello" class="btn btn-secondary trello-badge-btn" title="Trello sync">
        <span id="trello-dot" class="trello-dot trello-dot-gray"></span> Trello
      </button>
    </div>
  </header>

  <div class="filter-bar">
    <label class="filter-group">
      Status:
      <select id="filter-status"><option value="all">All</option></select>
    </label>
    <label class="filter-group">
      Priority:
      <select id="filter-priority"><option value="all">All</option></select>
    </label>
    <label class="filter-group">
      Tag:
      <select id="filter-tag"><option value="all">All</option></select>
    </label>
    <div class="filter-group">
      Location:
      <div id="location-switch" class="location-switch"></div>
    </div>
    <span id="wo-count" class="wo-count"></span>
  </div>

  <main id="main" class="main"></main>

  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="detail-title"></h2>
        <button id="detail-close" class="modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body" id="detail-body"></div>
    </div>
  </div>

  <div id="trello-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="trello-modal-title">Trello Config</h2>
        <button id="trello-close" class="modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body" id="trello-modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
